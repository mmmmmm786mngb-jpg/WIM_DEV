<h1 class="">Регистр сведений "Представители счета депо"</h1>
<p class="Usual">В регистре сведений "Представители счета депо" хранится история изменения данных о представителях счета депо.</p>
<p class="Usual">Движения по этому регистру делаются документами "<a href="Document.НазначениеПредставителяСчетаДепо/Help">Назначение представителя счета депо</a>" и "<a href="Document.ОтменаПредставителяСчетаДепо/Help">Отмена представителя счета депо</a>".</p></body></html>

<h1 class="">Журнал "Журнал документов с общим нумератором"</h1>
<p class="Usual">"Журнал документов с общим нумератором" предназначен для работы с документами, для которых применяется сквозная нумерация в соответствии с требованиями ФСФР и ПАРТАД.</p></body></html>
